<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tu contrato · Inmuebles Audiovisuales</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold        : #C9A84C;
    --gold-dim    : rgba(201,168,76,0.12);
    --charcoal    : #1C1C1E;
    --concrete    : #9B9B9F;
    --surface     : #F9F7F4;
    --white       : #FAFAFA;
    --bg-chip     : #F1F0ED;
    --border      : rgba(28,28,30,0.10);
    --border-strong: rgba(28,28,30,0.20);
    --error       : #E05252;
    --success     : #2D7A4F;
    --success-bg  : #E8F5EE;
    --success-border: rgba(45,122,79,0.25);
    --warn-bg     : #FFFBEB;
    --warn-border : rgba(217,119,6,0.25);
    --warn        : #B45309;
    --blue-bg     : #EFF6FF;
    --blue-border : rgba(37,99,235,0.20);
    --blue        : #1D4ED8;
    --r           : 8px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--surface); color: var(--charcoal); -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* Header */
  header { background: var(--charcoal); padding: 16px 24px; display: flex; align-items: center; justify-content: center; }
  header img { height: 34px; width: auto; }

  /* Stepper */
  .stepper { display: flex; align-items: center; justify-content: center; gap: 0; padding: 18px 24px 0; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; max-width: 120px; }
  .step-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border-strong); background: var(--white); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--concrete); transition: all 0.2s; }
  .step-circle.activo { border-color: var(--gold); background: var(--gold-dim); color: var(--charcoal); }
  .step-circle.listo  { border-color: var(--success); background: var(--success-bg); color: var(--success); }
  .step-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--concrete); text-align: center; }
  .step-label.activo { color: var(--charcoal); }
  .step-label.listo  { color: var(--success); }
  .step-line { flex: 1; height: 1.5px; background: var(--border-strong); max-width: 40px; margin-bottom: 20px; }
  .step-line.listo { background: var(--success); }

  /* States */
  #state-loading, #state-error { display: none; }
  .progreso-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 240px; gap: 16px; }
  .progreso-barra { width: min(240px, 60vw); height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progreso-relleno { height: 100%; background: var(--gold); border-radius: 2px; width: 0; animation: progreso 3s ease-out forwards; }
  .progreso-texto { font-size: 12px; color: var(--concrete); }
  @keyframes progreso { 0% { width: 0 } 50% { width: 65% } 80% { width: 82% } 100% { width: 88% } }

  /* Layout */
  .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 64px; }

  /* Cards */
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 22px 24px; margin-bottom: 16px; }

  /* Section titles */
  .section-title { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }

  /* Page greeting */
  .page-greeting { font-size: 21px; font-weight: 800; color: var(--charcoal); margin-bottom: 4px; letter-spacing: -0.3px; }
  .page-greeting span { color: var(--gold); }
  .page-sub { font-size: 13px; color: var(--concrete); margin-bottom: 22px; line-height: 1.6; }

  /* Summary rows */
  .resumen-fila { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
  .resumen-fila:last-child { border-bottom: none; }
  .resumen-label { color: var(--concrete); font-weight: 500; }
  .resumen-valor { font-weight: 700; color: var(--charcoal); text-align: right; }
  .resumen-valor.gold { color: var(--gold); font-size: 18px; }

  /* Property summary pill */
  .prop-resumen { background: var(--surface); border-radius: 10px; padding: 14px 16px; margin-top: 14px; }
  .prop-resumen-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .prop-badge { width: 22px; height: 22px; background: var(--charcoal); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .prop-resumen-nombre { font-size: 12px; font-weight: 700; }
  .prop-resumen-fecha  { font-size: 11px; color: var(--concrete); margin-bottom: 6px; }
  .prop-entregables    { font-size: 11px; color: var(--concrete); line-height: 1.8; padding-left: 14px; }
  .prop-entregables li { list-style: disc; }

  /* Form fields */
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: var(--concrete); margin-bottom: 6px; }
  .field input[type="text"], .field input[type="email"], .field textarea {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border-strong); border-radius: 8px;
    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; color: var(--charcoal);
    background: var(--bg-chip); outline: none; transition: border-color 0.15s, background 0.15s; -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--gold); background: var(--white); }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .field.has-error input, .field.has-error textarea { border-color: var(--error); }
  .field-error { font-size: 11px; color: var(--error); margin-top: 5px; display: none; }
  .field.has-error .field-error { display: block; }
  .field-hint { font-size: 11px; color: var(--concrete); margin-top: 5px; line-height: 1.5; }

  /* Orientación */
  .orientacion-grid { display: flex; gap: 10px; }
  .orientacion-btn { flex: 1; background: var(--bg-chip); border: 1.5px solid var(--border-strong); border-radius: 10px; padding: 14px 10px 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.15s; }
  .orientacion-btn:hover { border-color: var(--gold); }
  .orientacion-btn.activo { border-color: var(--gold); border-width: 2px; background: var(--gold-dim); }
  .orientacion-btn .img-wrap { width: 100%; height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .orientacion-btn .img-wrap img { max-width: 100%; max-height: 100%; display: block; }
  .orientacion-btn .titulo { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: var(--charcoal); margin-bottom: 3px; }
  .orientacion-btn .desc  { font-size: 10px; color: var(--concrete); line-height: 1.4; }

  /* Add-ons */
  .addon-card { border: 1.5px solid var(--border-strong); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 14px; background: var(--bg-chip); }
  .addon-card:hover  { border-color: var(--gold); }
  .addon-card.activo { border-color: var(--gold); background: var(--gold-dim); }
  .addon-check { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border-strong); background: var(--white); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .addon-check svg { display: none; }
  .addon-card.activo .addon-check { background: var(--gold); border-color: var(--gold); }
  .addon-card.activo .addon-check svg { display: block; }
  .addon-info { flex: 1; }
  .addon-nombre { font-size: 13px; font-weight: 700; color: var(--charcoal); display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .addon-precio { font-size: 12px; font-weight: 700; color: var(--gold); white-space: nowrap; }
  .addon-entregables { font-size: 11px; color: var(--concrete); margin-top: 4px; line-height: 1.5; }

  /* Total */
  .total-box { background: var(--gold-dim); border: 1.5px solid rgba(201,168,76,0.25); border-radius: 10px; padding: 16px 18px; margin-top: 4px; }
  .total-fila { display: flex; justify-content: space-between; font-size: 13px; color: var(--concrete); margin-bottom: 6px; font-weight: 500; }
  .total-fila:last-child { margin-bottom: 0; }
  .total-fila.separador { border-top: 1px solid rgba(201,168,76,0.30); padding-top: 8px; margin-top: 2px; }
  .total-fila.principal { color: var(--charcoal); font-size: 16px; font-weight: 800; }
  .total-fila.anticipo  { color: var(--gold); font-weight: 700; }

  /* Signature canvas */
  .firma-wrap { position: relative; }
  #firma-canvas { display: block; width: 100%; height: 200px; border: 1.5px solid var(--border-strong); border-radius: 10px; background: var(--white); cursor: crosshair; touch-action: none; }
  #firma-canvas.activo { border-color: var(--gold); }
  .firma-hint { font-size: 11px; color: var(--concrete); text-align: center; margin-top: 8px; }
  .btn-limpiar { background: none; border: 1px solid var(--border-strong); border-radius: 6px; padding: 6px 14px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; color: var(--concrete); cursor: pointer; transition: all 0.15s; }
  .btn-limpiar:hover { border-color: var(--charcoal); color: var(--charcoal); }
  /* Firma overlay — visual únicamente, no forma parte del canvas */
  .firma-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 56px; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 14px; gap: 6px; border-radius: 0 0 10px 10px; }
  .firma-overlay-linea { width: calc(100% - 32px); border-top: 1.5px dashed rgba(28,28,30,0.18); }
  .firma-overlay-texto { font-size: 11px; font-weight: 500; color: rgba(155,155,159,0.85); font-family: 'Montserrat', sans-serif; }
  /* Chip número de tarjeta */
  .tarjeta-chip { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; white-space: nowrap; background: var(--bg-chip); border: 1px solid var(--border-strong); border-radius: 5px; padding: 3px 8px; color: var(--charcoal); display: inline-block; }

  /* Terms */
  .terms-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
  .terms-row input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; accent-color: var(--gold); cursor: pointer; }
  .terms-row label { font-size: 12px; color: var(--charcoal); font-weight: 600; line-height: 1.5; cursor: pointer; }
  .terms-row a { color: var(--gold); text-decoration: none; font-weight: 700; }

  /* Buttons */
  .btn-primary { display: block; width: 100%; background: var(--gold); color: var(--charcoal); border: none; border-radius: 8px; padding: 16px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: #b8962e; }
  .btn-primary:disabled { background: var(--border-strong); color: var(--concrete); cursor: not-allowed; }
  .btn-secondary { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--white); color: var(--charcoal); border: 1.5px solid var(--border-strong); border-radius: 8px; padding: 13px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: border-color 0.15s; text-decoration: none; }
  .btn-secondary:hover { border-color: var(--charcoal); }
  .btn-wa { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: #25D366; color: #fff; border: none; border-radius: 8px; padding: 13px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; }

  /* Copy button */
  .dato-fila { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
  .dato-fila:last-child { border-bottom: none; }
  .dato-label { color: var(--concrete); font-weight: 500; font-size: 12px; flex-shrink: 0; }
  .dato-valor { font-weight: 700; color: var(--charcoal); text-align: right; word-break: break-all; }
  .btn-copy { background: var(--bg-chip); border: 1px solid var(--border-strong); border-radius: 5px; padding: 4px 10px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; color: var(--charcoal); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
  .btn-copy:hover { border-color: var(--gold); color: var(--gold); }
  .btn-copy.copiado { border-color: var(--success); color: var(--success); background: var(--success-bg); }

  /* Status banners */
  .banner { border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 12px; border: 1.5px solid; }
  .banner.success  { background: var(--success-bg); border-color: var(--success-border); }
  .banner.warn     { background: var(--warn-bg);    border-color: var(--warn-border); }
  .banner.info     { background: var(--blue-bg);    border-color: var(--blue-border); }
  .banner-icon { flex-shrink: 0; width: 20px; height: 20px; margin-top: 1px; }
  .banner-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .banner.success .banner-title { color: var(--success); }
  .banner.warn    .banner-title { color: var(--warn); }
  .banner.info    .banner-title { color: var(--blue); }
  .banner-desc  { font-size: 11px; color: var(--concrete); line-height: 1.55; }

  /* Abonos */
  .abono-fila { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
  .abono-fila:last-child { border-bottom: none; }
  .abono-meta { color: var(--concrete); }
  .abono-monto { font-weight: 700; color: var(--charcoal); }

  /* Delivery links */
  .entrega-link { display: flex; align-items: center; gap: 12px; background: var(--bg-chip); border: 1.5px solid var(--border-strong); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; text-decoration: none; color: var(--charcoal); transition: border-color 0.15s; }
  .entrega-link:hover { border-color: var(--gold); }
  .entrega-link-texto { font-size: 13px; font-weight: 700; flex: 1; }
  .entrega-link-sub { font-size: 11px; color: var(--concrete); font-weight: 400; }

  /* Error inline */
  .error-inline { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 11px 14px; font-size: 12px; color: var(--error); margin-top: 12px; display: none; }

  /* Error page */
  .error-page { background: var(--white); border-radius: 12px; padding: 40px 24px; text-align: center; max-width: 400px; margin: 32px auto; }
  .error-page-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .error-page-msg   { font-size: 13px; color: var(--concrete); line-height: 1.6; margin-bottom: 20px; }
  .btn-wa-small { display: inline-flex; align-items: center; gap: 6px; background: #25D366; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; }

  footer { text-align: center; padding: 24px; font-size: 11px; color: var(--concrete); }
  footer a { color: var(--gold); text-decoration: none; }

  .progress-bar-wrap { width:100%; height:4px; background:var(--border); border-radius:2px; margin-top:14px; overflow:hidden; display:none; }
  .progress-bar-fill { height:100%; width:0%; background:var(--gold); border-radius:2px; transition:width 0.4s ease; }
  .upload-field { margin-bottom:16px; }
  .upload-label { font-size:12px; font-weight:700; color:var(--charcoal); display:block; margin-bottom:2px; }
  .upload-hint  { font-size:11px; color:var(--concrete); margin:0 0 6px; line-height:1.5; }
  .upload-row   { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .btn-upload   { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border:1.5px solid var(--border-strong); border-radius:var(--r); font-family:inherit; font-size:11px; font-weight:700; color:var(--charcoal); cursor:pointer; transition:all 0.15s; flex-shrink:0; }
  .btn-upload:hover { border-color:var(--gold); color:var(--gold); }
  .upload-status { font-size:11px; }

  /* Print — solo muestra la card del comprobante */
  @media print {
    body > * { display: none !important; }
    body > #main-content { display: block !important; }
    .wrap > * { display: none !important; }
    #card-comprobante {
      display: block !important;
      box-shadow: none !important;
      border: none !important;
      margin: 0 !important;
    }
  }

  /* ── COMPROBANTE PROFESIONAL ─────────────────────────────── */
  #card-comprobante { padding: 0; overflow: hidden; }
  .comp-header {
    background: var(--charcoal);
    padding: 16px 22px;
    display: flex; align-items: center; justify-content: space-between;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .comp-header-logo { height: 28px; width: auto; }
  .comp-header-titulo {
    font-size: 13px; font-weight: 800; letter-spacing: 2.5px;
    text-transform: uppercase; color: white;
  }
  .comp-body { padding: 20px 22px; }
  .comp-meta {
    display: grid; grid-template-columns: 1fr auto;
    gap: 16px; margin-bottom: 18px;
    padding-bottom: 16px; border-bottom: 1.5px solid var(--border);
  }
  .comp-sec {
    font-size: 9px; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--charcoal);
    border-left: 2.5px solid var(--gold); padding-left: 7px;
    margin: 16px 0 10px;
  }
  .comp-sec-first { margin-top: 0; }
  .comp-info-lbl {
    font-size: 9px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
  }
  .comp-info-fila { display: flex; gap: 8px; font-size: 12px; margin-bottom: 3px; }
  .comp-info-key { font-weight: 700; min-width: 58px; flex-shrink: 0; color: var(--charcoal); }
  .comp-info-val { color: var(--concrete); word-break: break-all; }
  .comp-num-fila { display: flex; gap: 10px; justify-content: flex-end; font-size: 12px; margin-bottom: 4px; }
  .comp-num-key { font-weight: 700; color: var(--charcoal); }
  .comp-num-val { font-family: 'Courier New', monospace; font-weight: 700; color: var(--charcoal); }
  .comp-tabla { width: 100%; border-collapse: collapse; font-size: 12px; }
  .comp-tabla thead tr {
    background: var(--charcoal); color: white;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .comp-tabla th {
    padding: 9px 10px; font-size: 9px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase; text-align: left;
  }
  .comp-tabla th:last-child, .comp-tabla td:last-child { text-align: right; }
  .comp-tabla td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .comp-tabla tbody tr:nth-child(even) td {
    background: var(--surface);
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .comp-tabla tbody tr:last-child td { border-bottom: none; }
  .comp-totales { display: flex; justify-content: flex-end; margin-top: 8px; }
  .comp-totales-inner { min-width: 220px; }
  .comp-total-fila {
    display: flex; justify-content: space-between; gap: 20px;
    font-size: 12px; padding: 5px 0; color: var(--concrete);
    border-bottom: 1px solid var(--border);
  }
  .comp-total-fila .val { font-weight: 700; color: var(--charcoal); }
  .comp-total-final {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; margin-top: 6px; padding: 10px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
    background: var(--charcoal); color: white;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .comp-total-final .val { color: var(--gold); font-size: 14px; }
  .comp-total-final.liquidado { background: var(--success); }
  .comp-total-final.liquidado .val { color: white; }
  .comp-footer {
    margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--border);
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    font-size: 10px; color: var(--concrete);
  }
  .comp-footer a { color: var(--concrete); text-decoration: none; }
  .comp-footer-sep { color: var(--border-strong); }
  @media (max-width: 420px) {
    .comp-meta { grid-template-columns: 1fr; }
    .comp-num-fila { justify-content: flex-start; }
    .comp-totales { justify-content: stretch; }
    .comp-totales-inner { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <img src="https://inmueblesaudiovisuales.com/logo-invertido.svg" alt="Inmuebles Audiovisuales">
</header>

<div id="stepper" class="stepper" style="display:none">
  <div class="step">
    <div class="step-circle" id="step1-circle">1</div>
    <div class="step-label"  id="step1-label">Firma</div>
  </div>
  <div class="step-line" id="line1"></div>
  <div class="step">
    <div class="step-circle" id="step2-circle">2</div>
    <div class="step-label"  id="step2-label">Pago</div>
  </div>
  <div class="step-line" id="line2"></div>
  <div class="step">
    <div class="step-circle" id="step3-circle">3</div>

function apiGet(params) {
  var qs = typeof params === 'object' ? '?' + new URLSearchParams(params).toString() : params;
  return fetch(API + qs, { redirect: 'follow' }).then(function(r) { return r.json(); });
}

function apiPost(body, opts) {
  var timeoutMs = opts && opts.timeoutMs;
  var init = {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body), redirect: 'follow',
  };
  if (timeoutMs && typeof AbortController === 'function') {
    var ctrl = new AbortController();
    var timer = setTimeout(function() { ctrl.abort(); }, timeoutMs);
    init.signal = ctrl.signal;
    return fetch(API, init)
      .then(function(r) { clearTimeout(timer); return r.json(); })
      .catch(function(err) { clearTimeout(timer); throw err; });
  }
  return fetch(API, init).then(function(r) { return r.json(); });
}

function formatMXN(val) {
  var n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  if (isNaN(n)) return '';
  return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 }).format(n);
}

function formatFecha(str) {
  if (!str) return '';
  var dateOnly = String(str).substring(0, 10);
  var d = new Date(dateOnly + 'T12:00:00');
  if (isNaN(d)) return String(str);
  var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()];
}

function formatFechaHora(fechaStr, horaStr) {
  if (!fechaStr) return '';
  var dateOnly = String(fechaStr).substring(0, 10);
  var d = new Date(dateOnly + 'T12:00:00');
  if (isNaN(d)) return String(fechaStr);
  var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var base = dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()];
  if (!horaStr) return base;
  var partes = horaStr.split(':');
  var hh = parseInt(partes[0], 10), mm = String(partes[1] || '00').padStart(2, '0');
  var ampm = hh >= 12 ? 'p.m.' : 'a.m.';
  hh = hh % 12 || 12;
  return base + ' · ' + hh + ':' + mm + ' ' + ampm;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function safeHref(url) {
  if (!url) return '#';
  var u = String(url).trim();
  return /^https?:\/\//i.test(u) ? esc(u) : '#';
}

/* ── SIGNATURE CANVAS ───────────────────────────────────────────────────────── */

function initCanvas() {
  canvas = document.getElementById('firma-canvas');
  if (!canvas) return;
  ctx = canvas.getContext('2d');

  function resize() {
    var rect = canvas.getBoundingClientRect();
    var dpr  = window.devicePixelRatio || 1;
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.strokeStyle = '#1C1C1E';
    ctx.lineWidth   = 2.2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    if (hasStroke) {
      hasStroke = false;
      canvas.classList.remove('activo');
      actualizarBtnFirmar();
      var ov = document.getElementById('firma-overlay');
      if (ov) ov.style.display = 'flex';
    }
  }

  resize();
  new ResizeObserver(resize).observe(canvas);

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var src  = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  canvas.addEventListener('pointerdown', function(e) {
    isDrawing = true;
    var p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('pointermove', function(e) {
    if (!isDrawing) return;
    var p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if (!hasStroke) {
      hasStroke = true;
      canvas.classList.add('activo');
      actualizarBtnFirmar();
      // Ocultar overlay al primer trazo real
      var ov = document.getElementById('firma-overlay');
      if (ov) ov.style.display = 'none';
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('pointerup',    function() { isDrawing = false; });
  canvas.addEventListener('pointerleave', function() { isDrawing = false; });
}

function limpiarFirma() {
  if (!ctx || !canvas) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasStroke = false;
  canvas.classList.remove('activo');
  actualizarBtnFirmar();
  // Restaurar overlay al limpiar la firma
  var ov = document.getElementById('firma-overlay');
  if (ov) ov.style.display = 'flex';
}

function actualizarBtnFirmar() {
  var btn = document.getElementById('btn-firmar');
  if (!btn) return;
  var chk = document.getElementById('chk-terminos');
  var terminos = chk ? chk.checked : true;
  btn.disabled = !hasStroke || !terminos;
}

function _renderComprobante(d) {
  var abonos    = d.abonos || [];
  var pagado    = parseFloat(d.totalAbonado) || 0;
  var total     = parseFloat(d.precioTotal)  || 0;
  var saldo     = Math.max(0, total - pagado);
  var props     = d.propiedades || [];
  var liquidado = saldo <= 0;
  var hoy       = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});

  var srvcRows = props.map(function(p, i) {
    var label = props.length > 1
      ? 'Propiedad ' + (i + 1) + (p.paquete ? ': ' + p.paquete : '')
      : (p.paquete || 'Producción audiovisual');
    var fecha = p.fechaSesion ? formatFechaHora(p.fechaSesion, p.horaSesion) : '—';
    var monto = props.length === 1
      ? '<strong>' + formatMXN(total) + '</strong>'
      : '<span style="color:var(--concrete)">—</span>';
    var row = '<tr><td>' + esc(label) + '</td><td style="color:var(--concrete)">' + esc(fecha) + '</td><td>' + monto + '</td></tr>';
    if (p.entregables) {
      // Soportar separador \n (formato actual) y | (formato legado).
      // Quitar texto entre parentesis para mayor limpieza en el comprobante.
      var items = p.entregables.split(/[\n|]/).map(function(s) {
        return s.trim().replace(/\s*\([^)]*\)/g, '').split(' — ')[0].trim();
      }).filter(Boolean);
      if (items.length) {
        var lista = '<ul style="margin:4px 0 8px;padding-left:14px">' + items.map(function(nombre) {
          return '<li style="font-size:11px;color:var(--charcoal);line-height:1.5;margin-bottom:2px">' + esc(nombre) + '</li>';
        }).join('') + '</ul>';
        row += '<tr><td colspan="3" style="padding-top:0;border-bottom:1px solid var(--border);text-align:left">' + lista + '</td></tr>';
      }
    }
    return row;
  }).join('');
  if (!srvcRows) srvcRows = '<tr><td colspan="3" style="color:var(--concrete);font-style:italic;font-size:11px">Sin servicios registrados</td></tr>';

  // Agregar filas para los extras ya acordados (pre-incluidos en el precio).
  var extrasRows = '';
  var extrasComp = d.extrasAcordados || [];
  if (extrasComp.length) {
    extrasRows = extrasComp.map(function(svc) {
      return '<tr><td style="font-weight:600">' + esc(svc.nombre || '—') + '</td>' +
        '<td style="color:var(--concrete);font-style:italic;font-size:11px">Adicional</td>' +
        '<td style="color:var(--concrete)">—</td></tr>';
    }).join('');
    srvcRows += extrasRows;
  }

  var pagoRows = abonos.map(function(a) {
    return '<tr>' +
      '<td style="font-weight:600">' + esc(a.metodo || 'Transferencia') + '</td>' +
      '<td style="color:var(--concrete)">' + esc(a.fecha ? formatFecha(a.fecha) : '—') + '</td>' +
      '<td style="color:var(--success);font-weight:700">+' + esc(formatMXN(a.monto)) + '</td>' +
    '</tr>';
  }).join('');
  if (!pagoRows) pagoRows = '<tr><td colspan="3" style="color:var(--concrete);font-style:italic;font-size:11px">Sin pagos registrados aún</td></tr>';

  var totalFilas =
    '<div class="comp-total-fila"><span>Total del servicio</span><span class="val">' + formatMXN(total) + '</span></div>' +
    '<div class="comp-total-fila" style="border-bottom:none"><span>Total pagado</span><span class="val" style="color:var(--success)">' + formatMXN(pagado) + '</span></div>';
  var finalRow = liquidado
    ? '<div class="comp-total-final liquidado"><span>Liquidado</span><span class="val">$0</span></div>'
    : '<div class="comp-total-final"><span>Saldo pendiente</span><span class="val">' + formatMXN(saldo) + '</span></div>';

  return (
    '<div class="card" id="card-comprobante">' +
      '<div class="comp-header">' +
        '<img class="comp-header-logo" src="https://inmueblesaudiovisuales.com/logo-invertido.svg" alt="Inmuebles Audiovisuales">' +
        '<span class="comp-header-titulo">Comprobante de pago</span>' +
      '</div>' +
      '<div class="comp-body">' +
        '<div class="comp-meta">' +
          '<div>' +
            '<p class="comp-info-lbl">Información del cliente</p>' +
            '<div class="comp-info-fila"><span class="comp-info-key">Nombre</span><span class="comp-info-val">' + esc(d.nombre || '—') + '</span></div>' +
            (d.telefono ? '<div class="comp-info-fila"><span class="comp-info-key">Teléfono</span><span class="comp-info-val">' + esc(d.telefono) + '</span></div>' : '') +
            (d.correo   ? '<div class="comp-info-fila"><span class="comp-info-key">Correo</span><span class="comp-info-val">' + esc(d.correo) + '</span></div>' : '') +
          '</div>' +
          '<div>' +
            (d.folio ? '<div class="comp-num-fila"><span class="comp-num-key">Folio</span><span class="comp-num-val">' + esc(d.folio) + '</span></div>' : '') +
            '<div class="comp-num-fila"><span class="comp-num-key">Fecha</span><span class="comp-num-val">' + hoy + '</span></div>' +
          '</div>' +
        '</div>' +
        '<p class="comp-sec comp-sec-first">Servicios</p>' +
        '<table class="comp-tabla">' +
          '<thead><tr><th>Servicio</th><th>Fecha de sesión</th><th>Total</th></tr></thead>' +
          '<tbody>' + srvcRows + '</tbody>' +
        '</table>' +
        '<div class="comp-totales"><div class="comp-totales-inner">' + totalFilas + finalRow + '</div></div>' +
        '<p class="comp-sec">Historial de pagos</p>' +
        '<table class="comp-tabla">' +

function enviarFirma() {
  if (enviando || !formData) return;
  var errEl = document.getElementById('error-firma');
  errEl.style.display = 'none';

  if (!canvas) {
    errEl.textContent = 'Error: área de firma no disponible. Recarga la página.';
    errEl.style.display = 'block';
    return;
  }
  var firmaDataUrl = canvas.toDataURL('image/png');
  var btn = document.getElementById('btn-firmar');
  btn.disabled    = true;
  btn.textContent = 'Firmando contrato...';
  enviando        = true;

  var wrap = document.getElementById('firma-progress-wrap');
  var fill = document.getElementById('firma-progress-fill');
  if (wrap) { wrap.style.display = 'block'; }
  if (fill) {
    fill.style.width = '0%';
    setTimeout(function() { fill.style.width = '70%'; }, 50);
    setTimeout(function() { fill.style.width = '90%'; }, 2000);
  }

  apiPost({
    action          : 'manejarFirmaCliente',
    token           : token,
    correoCliente   : formData.correo,
    telefonoCliente : formData.telefono,
    firmaBase64     : firmaDataUrl,
    adicionales     : formData.adicionalesSeleccionados,
    propiedades     : formData.propsPayload,
  })
    .then(function(data) {
      enviando = false;
      if (!data.ok) {
        // Si el contrato ya fue firmado (request anterior llegó pero respuesta se perdió),
        // recuperar datos del servidor y avanzar a etapa 2 en lugar de mostrar error.
        if (data.error && data.error.indexOf('ya fue firmado') !== -1) {
          formData = null;
          if (wrap) wrap.style.display = 'none';
          apiGet('?action=obtenerPortal&token=' + encodeURIComponent(token))
            .then(function(freshData) {
              if (freshData.ok) portalData = freshData;
              actualizarStepper(2);
              renderEtapa2();
            })
            .catch(function() {
              actualizarStepper(2);
              renderEtapa2();
            });
          return;
        }
        errEl.textContent   = data.error || 'Ocurrió un error. Intenta de nuevo.';
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = 'FIRMAR CONTRATO';
        if (wrap) wrap.style.display = 'none';
        if (fill) fill.style.width = '0%';
        actualizarBtnFirmar();
        return;
      }
      // Actualizar estado local con los datos de la respuesta para que
      // renderEtapa2 funcione aunque la recarga de datos falle.
      if (portalData) {
        portalData.estatus     = 'Firmado';
        portalData.precioTotal = data.total    || portalData.precioTotal;
        portalData.anticipo    = data.anticipo || portalData.anticipo;
        if (data.folio) portalData.folio = data.folio;
      }
      formData = null;
      // Intentar recargar datos frescos del servidor; si falla, renderizar
      // con los datos locales para no dejar al cliente en pantalla de error.
      apiGet('?action=obtenerPortal&token=' + encodeURIComponent(token))
        .then(function(freshData) {
          if (freshData.ok) portalData = freshData;
          actualizarStepper(2);
          renderEtapa2();
        })
        .catch(function() {
          actualizarStepper(2);
          renderEtapa2();
        });
    })
    .catch(function() {
      enviando = false;
      errEl.textContent   = 'Error de conexión. Verifica tu internet e intenta de nuevo.';
      errEl.style.display = 'block';
      btn.disabled        = false;
      btn.textContent     = 'FIRMAR CONTRATO';
      if (wrap) wrap.style.display = 'none';
      if (fill) fill.style.width = '0%';
      actualizarBtnFirmar();
    });
}

    html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    html += 'Escríbenos por WhatsApp</a>';
    html += '</div>';
    document.getElementById('main-content').innerHTML = html;
    return;
  }

  var html = '<div class="wrap">';

  if ((estatus === 'Entregado' || estatus === 'Liquidado') && !revocada) {
    html += '<div class="banner success" style="background:linear-gradient(135deg,#0d2b1a 0%,#0a1f12 100%);border-color:#2ecc71;padding:20px 16px">';
    html += '<div style="text-align:center;width:100%">';
    html += '<div style="font-size:17px;font-weight:700;color:#2ecc71;margin-bottom:4px">Tu producción está lista</div>';
    html += '<div style="font-size:13px;color:var(--concrete);line-height:1.5">Encontrarás todos tus archivos en la carpeta de Google Drive. Si tienes cualquier duda, escríbenos por WhatsApp.</div>';
    html += '</div></div>';
  }

  // Links de entrega — ocultos si el acceso fue revocado desde el admin
  if (entrega && revocada) {
    html += '<div class="card"><p class="section-title">Material no disponible</p>';
    html += '<p style="font-size:13px;color:var(--concrete);margin-bottom:16px;line-height:1.6">El acceso a tu material está suspendido temporalmente. Escríbenos por WhatsApp y con gusto lo resolvemos.</p>';
    html += '<a href="https://wa.me/5218127174207?text=' + encodeURIComponent('Hola, no puedo acceder a la descarga de mi material.') + '" target="_blank" rel="noopener" class="btn-secondary" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#25d366;border-color:#25d366">';
    html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    html += 'Escríbenos por WhatsApp</a></div>';
  } else if (entrega) {
    html += '<div class="card"><p class="section-title">Descarga tu material</p>';
    html += '<p style="font-size:12px;color:var(--concrete);margin-bottom:16px;line-height:1.6">Los archivos están disponibles en Google Drive. El acceso está disponible por 30 días.</p>';
    html += '<a href="' + esc(entrega) + '" target="_blank" rel="noopener" class="entrega-link">';
    html += '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    html += '<div><div class="entrega-link-texto">Carpeta de entregables</div><div class="entrega-link-sub">Google Drive · Clic para abrir</div></div>';
    html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--concrete)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></a>';

    // Links extra (one per line; format: "Etiqueta|https://..." o solo URL)
    if (extras) {
      extras.split('\n').forEach(function(linea) {
        var l = linea.trim();
        if (!l) return;
        var etiqueta = 'Link adicional';
        var url = l;
        var pipe = l.indexOf('|');
        if (pipe !== -1) {
          etiqueta = l.substring(0, pipe).trim() || etiqueta;
          url      = l.substring(pipe + 1).trim();
        }
        if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url;
        if (!url) return;
        html += '<a href="' + safeHref(url) + '" target="_blank" rel="noopener" class="entrega-link">';
        html += '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--concrete)" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
        html += '<div><div class="entrega-link-texto">' + esc(etiqueta) + '</div><div class="entrega-link-sub">' + esc(url.substring(0, 60)) + (url.length > 60 ? '...' : '') + '</div></div>';
        html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--concrete)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></a>';
      });
    }
    html += '</div>';
  }

  html += '<details style="margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden">';
  html += '<summary style="padding:14px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gold);list-style:none;display:flex;align-items:center;justify-content:space-between;background:var(--surface)">';
  html += '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="margin-right:6px;vertical-align:-2px"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>Ver comprobante de pago</span>';
  html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--concrete)" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
  html += '</summary>';
  html += '<div style="padding:0 4px 0">' + _renderComprobante(d) + '</div>';
  html += '<div style="padding:0 16px 14px">';
  html += '<button class="btn-secondary" id="btn-imprimir" style="width:100%">';
  html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>';
  html += 'Imprimir / Guardar comprobante</button>';
  html += '</div></details>';

  // Guía de publicación e instrucciones
  html += '<a href="/guia-publicacion.html" target="_blank" rel="noopener" class="btn-secondary" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:12px">';
  html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  html += 'Cómo publicar tus reels e imágenes en alta calidad</a>';

  // Saldo pendiente si hay
  if (saldo > 0) {
    html += '<div class="banner warn"><div class="banner-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>';
    html += '<div><div class="banner-title">Saldo pendiente: ' + formatMXN(saldo) + '</div><div class="banner-desc">Para recibir los archivos finales necesitamos que liquides el saldo restante.</div></div></div>';
    if (d.clipLink) {
      html += '<a href="' + esc(d.clipLink) + '" target="_blank" rel="noopener" class="btn-primary" style="display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;margin-bottom:16px">PAGAR SALDO RESTANTE</a>';
    }
  }

  // Soporte WhatsApp
  html += '<a href="https://wa.me/5218127174207?text=' + encodeURIComponent('Hola, tengo una pregunta sobre la entrega de mi sesión fotográfica.') + '" target="_blank" rel="noopener" class="btn-secondary" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:12px;color:#25d366;border-color:#25d366">';
  html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  html += '¿Necesitas ayuda? Escríbenos por WhatsApp</a>';

  // Google review
  html += '<div class="card" style="text-align:center"><p class="section-title" style="text-align:center">¿Quedaste satisfecho?</p>';
  html += '<p style="font-size:13px;color:var(--concrete);margin-bottom:16px;line-height:1.6">Tu reseña nos ayuda a llegar a más clientes como tú. ¡Gracias!</p>';
  html += '<a href="https://g.page/r/CQTT-o3a_kVcEBM/review" target="_blank" rel="noopener" class="btn-secondary" style="text-decoration:none">';
  html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  html += 'Dejar reseña en Google</a></div>';

  html += '</div>'; // end wrap
  document.getElementById('main-content').innerHTML = html;

  document.getElementById('btn-imprimir').addEventListener('click', function() { window.print(); });

  var estrellas = document.querySelectorAll('.estrella-rating');
  var calActual = 0;
  if (estrellas.length) {
    estrellas.forEach(function(el) {
      el.addEventListener('click', function() {
        calActual = parseInt(el.getAttribute('data-val'));
        _calificacionSeleccionada = calActual;
        estrellas.forEach(function(e) {
          var v = parseInt(e.getAttribute('data-val'));
          e.setAttribute('fill', v <= calActual ? 'var(--gold)' : 'none');
          e.setAttribute('stroke', 'var(--gold)');
        });
        var btn = document.getElementById('btn-enviar-resena');
        if (btn) btn.disabled = false;
      });
      el.addEventListener('mouseenter', function() {
        var v = parseInt(el.getAttribute('data-val'));
        estrellas.forEach(function(e) {
          var ev = parseInt(e.getAttribute('data-val'));
          e.setAttribute('fill', ev <= v ? 'var(--gold)' : 'none');
          e.setAttribute('stroke', ev <= v ? 'var(--gold)' : 'var(--border-strong)');
        });
      });
      el.addEventListener('mouseleave', function() {
        estrellas.forEach(function(e) {
          var ev = parseInt(e.getAttribute('data-val'));
          e.setAttribute('fill', ev <= calActual ? 'var(--gold)' : 'none');
          e.setAttribute('stroke', ev <= calActual ? 'var(--gold)' : 'var(--border-strong)');
        });
      });
    });
  }
}

var _calificacionSeleccionada = 0;
function enviarResena() {
  var calVal = _calificacionSeleccionada;
  if (!calVal) return;
  var texto = (document.getElementById('resena-texto') || {value:''}).value.trim();
  var btn   = document.getElementById('btn-enviar-resena');
  var msg   = document.getElementById('msg-resena');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }
  apiPost({ action: 'guardarResena', token: token, calificacion: calVal, resenaTexto: texto })
    .then(function(data) {
      if (!data.ok && !data.yaRegistrada) throw new Error(data.error || 'Error');
      if (msg) { msg.style.color = 'var(--success)'; msg.textContent = 'Gracias por tu reseña.'; }
      var card = document.getElementById('card-resena');
      if (card) {
        var estrellasFilled = '';
        for (var i = 1; i <= 5; i++) {
          estrellasFilled += '<svg width="22" height="22" viewBox="0 0 24 24" fill="' + (i <= calVal ? 'var(--gold)' : 'none') + '" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" style="margin:0 2px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
        }
        card.innerHTML = '<p class="section-title" style="text-align:center">Gracias por tu reseña</p><div style="text-align:center;margin-bottom:8px">' + estrellasFilled + '</div>' + (texto ? '<p style="font-size:12px;color:var(--concrete);font-style:italic;text-align:center;margin:0">"' + esc(texto) + '"</p>' : '');
      }
    })
    .catch(function(e) {
      if (msg) { msg.style.color = 'var(--error,#e74c3c)'; msg.textContent = 'Error al enviar. Intenta de nuevo.'; }
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar reseña'; }
    });
}

/* ── SUBIDA DE ARCHIVOS ──────────────────────────────────────────────────────── */

function renderUploadField(tipo, propIndex, label, hint) {
  var idInput  = 'upload-input-'  + tipo + '-' + propIndex;
  var idStatus = 'upload-status-' + tipo + '-' + propIndex;
  return '<div class="upload-field">' +
    '<span class="upload-label">' + label + '</span>' +
    (hint ? '<p class="upload-hint">' + hint + '</p>' : '') +
    '<div class="upload-row">' +
      '<label for="' + idInput + '" class="btn-upload">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' +
        'Seleccionar' +
      '</label>' +
      '<input type="file" id="' + idInput + '" accept="image/*" style="display:none" ' +
        'onchange="subirArchivoPortal(\'' + tipo + '\',' + propIndex + ',this)">' +
      '<span class="upload-status" id="' + idStatus + '"></span>' +
    '</div>' +
  '</div>';
}

function subirArchivoPortal(tipo, propIndex, inputEl) {
  var file = inputEl.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) {
    setUploadStatus(tipo, propIndex, 'error', 'El archivo es muy grande (máx. 8 MB)');
    return;
  }
  var clave = tipo + '-' + propIndex;
  uploadsEnProgreso++;
  setUploadStatus(tipo, propIndex, 'loading', '');
  var reader = new FileReader();
  reader.onload = function(e) {
    apiPost({
      action    : 'subirArchivo',
      token     : token,
      propIndex : propIndex,
      tipo      : tipo,
      fileName  : file.name,
      mimeType  : file.type || 'image/jpeg',
      fileBase64: e.target.result,
    }, { timeoutMs: 60000 })
    .then(function(data) {
      uploadsEnProgreso = Math.max(0, uploadsEnProgreso - 1);
      if (data.ok) {
        if (data.url) archivosSubidos[clave] = data.url;
        setUploadStatus(tipo, propIndex, 'ok', file.name);
      } else {
        var msg = data.error || 'Error al subir';
        // Token expirado: mostrar error legible para que el cliente no quede atascado.
        if (msg.indexOf('expirado') !== -1 || msg.indexOf('inválido') !== -1) {
          msg = 'El enlace expiró. Recarga la página e intenta de nuevo.';
        }
        setUploadStatus(tipo, propIndex, 'error', msg);
      }
    })
    .catch(function(err) {
      uploadsEnProgreso = Math.max(0, uploadsEnProgreso - 1);
      var msg = (err && err.name === 'AbortError')
        ? 'La subida tardó demasiado. Verifica tu conexión e intenta de nuevo.'
        : 'Error de conexión';
      setUploadStatus(tipo, propIndex, 'error', msg);
    });
  };
  reader.onerror = function() {
    uploadsEnProgreso = Math.max(0, uploadsEnProgreso - 1);
    setUploadStatus(tipo, propIndex, 'error', 'No se pudo leer el archivo');
  };
  try {
    reader.readAsDataURL(file);
  } catch (e) {
    uploadsEnProgreso = Math.max(0, uploadsEnProgreso - 1);
    setUploadStatus(tipo, propIndex, 'error', 'No se pudo leer el archivo');
  }
}

function setUploadStatus(tipo, propIndex, estado, texto) {
  var el = document.getElementById('upload-status-' + tipo + '-' + propIndex);
  if (!el) return;
  if (estado === 'loading') {
    el.textContent = 'Subiendo...';
    el.style.color = 'var(--concrete)';
  } else if (estado === 'ok') {
    el.textContent = texto + ' — listo';
    el.style.color = 'var(--success)';
  } else {
    el.textContent = texto;
    el.style.color = 'var(--error)';
  }
}

init();
</script>
