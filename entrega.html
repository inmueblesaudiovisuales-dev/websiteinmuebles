<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu material está listo · Inmuebles Audiovisuales</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-dim2: rgba(201,168,76,0.08);
    --charcoal: #1C1C1E;
    --surface: #242426;
    --surface2: #2c2c2e;
    --border: rgba(255,255,255,0.07);
    --border-gold: rgba(201,168,76,0.25);
    --concrete: #9B9B9F;
    --white: #FAFAFA;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--charcoal);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    height: 480px;
    background: #000;
    background-size: cover;
    background-position: center center;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-placeholder svg {
    opacity: 0.18;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.6) 0%,
      rgba(0,0,0,0.45) 30%,
      rgba(0,0,0,0.75) 60%,
      rgba(0,0,0,0.95) 100%
    );
  }

  /* ── HERO CONTENT ── */
  .hero-content {
    position: relative;
    padding: 0 24px;
    max-width: 540px;
    width: 100%;
    margin: 0 auto;
  }

  .prop-pill {
    display: inline-flex;
    align-items: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #1C1C1E;
    background: var(--gold);
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .prop-address {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }

  .mensaje {
    font-size: 13px;
    font-weight: 500;
    color: rgba(250,250,250,0.85);
    line-height: 1.7;
    margin-bottom: 0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  }

  .mensaje strong {
    color: var(--white);
    font-weight: 700;
  }

  /* ── LOGO BAR ── */
  .logo-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
  }

  .logo-bar img {
    height: 36px;
    width: auto;
  }

  /* ── CONTENIDO ── */
  .content {
    max-width: 540px;
    margin: 0 auto;
    padding: 24px 24px 64px;
  }

  .divider {
    width: 36px;
    height: 2px;
    background: var(--gold);
    margin: 18px 0;
    border-radius: 2px;
  }

  /* ── SECCIÓN TÍTULO ── */
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--concrete);
    margin-bottom: 14px;
  }

  /* ── BOTONES DE MATERIAL ── */
  .btn-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .recordatorio {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 32px;
  }

  .recordatorio-icon {
    flex-shrink: 0;
    margin-top: 1px;
  }

  .recordatorio-icon svg {
    width: 14px;
    height: 14px;
    stroke: var(--concrete);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .recordatorio-text {
    font-size: 11px;
    color: var(--concrete);
    line-height: 1.65;
  }

  .btn-material {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }

  .btn-material:hover {
    border-color: var(--border-gold);
    background: var(--surface2);
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .btn-text {
    flex: 1;
    min-width: 0;
  }

  .btn-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 2px;
  }

  .btn-sub {
    font-size: 11px;
    color: var(--concrete);
  }

  .btn-arrow {
    color: var(--concrete);
    font-size: 20px;
    flex-shrink: 0;
    margin-left: 8px;
    transition: color 0.2s;
  }

  .btn-material:hover .btn-arrow {
    color: var(--gold);
  }

  /* ── TOUR CODE ── */
  .tour-section {
    margin-bottom: 32px;
  }

  .tour-code-block {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .tour-code-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--concrete);
    margin-bottom: 8px;
  }

  .tour-code-pre {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--concrete);
    background: var(--charcoal);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    white-space: pre;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .tour-copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 0.5px solid var(--border-gold);
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .tour-copy-btn:hover { background: var(--gold-dim); }

  /* ── RESEÑA ── */
  .review-card {
    background: var(--gold-dim2);
    border: 0.5px solid var(--border-gold);
    border-radius: 14px;
    padding: 22px 20px;
  }

  .stars {
    color: var(--gold);
    font-size: 20px;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .review-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .review-sub {
    font-size: 12px;
    color: var(--concrete);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .review-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: var(--charcoal);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 8px;
    transition: opacity 0.2s;
  }

  .review-btn:hover { opacity: 0.88; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(155,155,159,0.35);
  }

  /* ── NO PARAMS ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--concrete);
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    stroke: var(--concrete);
    fill: none;
    stroke-width: 1.5;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 14px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="hero" id="hero">
  <div class="hero-placeholder" id="hero-placeholder">
    <svg width="80" height="80" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 28L32 8L56 28V56H40V40H24V56H8V28Z" stroke="#C9A84C" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="44" cy="20" r="7" stroke="#C9A84C" stroke-width="1.8"/>
      <path d="M37.5 20l-5 5" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="hero-overlay"></div>
  <div class="logo-bar">
    <img src="logo-invertido.svg" alt="Inmuebles Audiovisuales">
  </div>
  <div class="hero-content" id="hero-content"></div>
</div>

<div class="content">
  <div id="main-content"></div>
</div>

<script>
  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return {
      nombre:       p.get('nombre')       || '',
      direccion:    p.get('direccion')    || '',
      portada:      p.get('portada')      || '',
      drive:        p.get('drive')        || '',
      drive_label:  p.get('drive_label')  || 'Material del proyecto',
      drive_sub:    p.get('drive_sub')    || 'Carpeta de Google Drive',
      tour:         p.get('tour')         || '',
      tour_label:   p.get('tour_label')   || 'Recorrido Virtual Inmersivo',
      tour_sub:     p.get('tour_sub')     || 'Cloudpano',
      extra1_url:   p.get('extra1_url')   || '',
      extra1_label: p.get('extra1_label') || 'Material adicional',
      extra1_sub:   p.get('extra1_sub')   || '',
      extra2_url:   p.get('extra2_url')   || '',
      extra2_label: p.get('extra2_label') || 'Material adicional',
      extra2_sub:   p.get('extra2_sub')   || '',
      review:       p.get('review')       || '',
    };
  }

  function iconDrive() {
    return `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
  }

  function iconTour() {
    return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18M12 3a9 9 0 0 0 0 18M3 12h18"/></svg>`;
  }

  function iconFile() {
    return `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>`;
  }

  function buildBtn(url, label, sub, iconHtml) {
    if (!url) return '';
    return `
      <a href="${url}" target="_blank" rel="noopener" class="btn-material">
        <div class="btn-icon">${iconHtml}</div>
        <div class="btn-text">
          <div class="btn-label">${label}</div>
          ${sub ? `<div class="btn-sub">${sub}</div>` : ''}
        </div>
        <span class="btn-arrow">›</span>
      </a>`;
  }

  function getCloudpanoId(url) {
    if (!url) return '';
    const match = url.match(/cloudpano\.com\/(?:tours\/|pub\/)([A-Za-z0-9_-]+)/);
    return match ? match[1] : '';
  }

  function buildTourEmbed(tourUrl) {
    return '';
  }

  function injectTourScript(id) {}

  function copySnippet() {
    const pre = document.getElementById('tour-snippet');
    navigator.clipboard.writeText(pre.innerText).then(() => {
      const btn = document.querySelector('.tour-copy-btn');
      btn.textContent = 'Copiado';
      setTimeout(() => btn.textContent = 'Copiar código', 2000);
    });
  }

  function render() {
    const d = getParams();
    const nombreCorto = d.nombre ? d.nombre.split(' ')[0] : '';
    const hayMaterial = d.drive || d.tour || d.extra1_url || d.extra2_url;

    if (!hayMaterial && !d.direccion) {
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p>Enlace de entrega no válido.</p>
        </div>`;
      return;
    }

    // Foto de portada
    if (d.portada) {
      const hero = document.getElementById('hero');
      const placeholder = document.getElementById('hero-placeholder');
      hero.style.backgroundImage = `url('${d.portada}')`;
      placeholder.style.display = 'none';
    }

    // Contenido del hero
    document.getElementById('hero-content').innerHTML = `
      <span class="prop-pill">Tu material está listo</span>
      <p class="prop-address">${d.direccion || 'Tu propiedad'}</p>
      <p class="mensaje">${nombreCorto ? `Hola, <strong>${nombreCorto}.</strong> ` : ''}Fue un placer trabajar en esta propiedad. Aquí tienes todo el material listo para publicar. Cualquier comentario o duda, escríbenos.</p>
    `;

    const btns = [
      buildBtn(d.drive,      d.drive_label,  d.drive_sub,  iconDrive()),
      buildBtn(d.tour,       d.tour_label,   d.tour_sub,   iconTour()),
      buildBtn(d.extra1_url, d.extra1_label, d.extra1_sub, iconFile()),
      buildBtn(d.extra2_url, d.extra2_label, d.extra2_sub, iconFile()),
    ].filter(Boolean).join('');

    const reviewSection = d.review ? `
      <p class="section-title" style="margin-top:0;">¿Qué te pareció?</p>
      <div class="review-card">
        <div class="stars">★★★★★</div>
        <p class="review-title">¿Te gustó el resultado? Cuéntanos cómo fue trabajar con nosotros. Tu reseña nos apoya muchísimo para seguir creciendo.</p>
        <a href="${d.review}" target="_blank" rel="noopener" class="review-btn">
          Dejar reseña en Google
        </a>
      </div>` : '';

    const tourId = getCloudpanoId(d.tour);
    const tourEmbed = buildTourEmbed(d.tour);

    document.getElementById('main-content').innerHTML = `
      ${hayMaterial ? `
        <p class="section-title">Tu material</p>
        <div class="btn-grid">${btns}</div>
        <div class="recordatorio">
          <div class="recordatorio-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <div class="recordatorio-text">Tienes <strong style="color:var(--white)">30 días</strong> para descargar tu material de Google Drive.${d.tour ? ` El hosting de tu recorrido virtual está incluido por <strong style="color:var(--white)">12 meses</strong>.` : ''}</div>
        </div>
      ` : ''}
      ${tourEmbed}
      ${reviewSection}
      <p class="footer">Inmuebles Audiovisuales · Monterrey, NL</p>
    `;

    if (tourId) injectTourScript(tourId);
  }

  render();
</script>

</body>
</html>
